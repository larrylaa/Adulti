<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adulti - Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="ios-frame">
    <div class="dynamic-island"></div>
    <div class="status-bar">
      <span>9:41</span>
      <span><i class="fa-solid fa-signal"></i> <i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-full"></i></span>
    </div>

    <main class="screen-scroll">
      <section class="card soft-gradient p-4">
        <div class="flex items-center gap-3">
          <img class="avatar" src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?auto=format&fit=crop&w=100&q=80" alt="Profile">
          <div>
            <h1 class="section-title">Maya Lee</h1>
            <p class="section-subtitle">Graduate mode • Active for 12 weeks</p>
          </div>
        </div>
      </section>

      <section class="card mt-4 p-4">
        <h2 class="text-sm font-semibold">Milestones</h2>
        <div class="mt-3 space-y-2 text-xs text-slate-700">
          <p><i class="fa-solid fa-circle-check text-green-600"></i> Starter buffer completed</p>
          <p><i class="fa-solid fa-circle-check text-green-600"></i> Emergency fund at 69%</p>
          <p><i class="fa-regular fa-circle text-slate-400"></i> Debt-free target in progress</p>
        </div>
      </section>

      <section class="card mt-3 p-4">
        <h2 class="text-sm font-semibold">Accounts</h2>
        <div class="mt-2 list-row"><span class="text-sm">401(k)</span><span class="text-xs text-slate-500">Enabled</span></div>
        <div class="list-row"><span class="text-sm">IRA</span><span class="text-xs text-slate-500">Roth</span></div>
        <div class="list-row"><span class="text-sm">HSA</span><span class="text-xs text-slate-500">Enabled</span></div>
      </section>
    </main>

    <nav class="tab-bar">
      <div class="tab-item"><i class="fa-solid fa-house"></i>Home</div>
      <div class="tab-item"><i class="fa-solid fa-map"></i>Roadmap</div>
      <div class="tab-item"><i class="fa-solid fa-book-open"></i>Guide</div>
      <div class="tab-item active"><i class="fa-solid fa-user"></i>Profile</div>
    </nav>
  </div>
</body>
</html>
