<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adulti MVP High-Fidelity Screens</title>
  <style>
    body {
      margin: 0;
      background: #ffffff;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #0f172a;
    }
    h1 {
      margin: 24px 24px 8px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      padding: 18px 24px 30px;
      align-items: flex-start;
    }
    .screen {
      width: 430px;
    }
    .screen-title {
      font-size: 13px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 8px;
    }
    iframe {
      width: 430px;
      height: 932px;
      border: 0;
      border-radius: 54px;
      overflow: hidden;
      box-shadow: 0 18px 44px rgba(15, 23, 42, 0.14);
      background: #fff;
    }
  </style>
</head>
<body>
  <h1>Adulti MVP High-Fidelity Prototype</h1>
  <div class="grid">
    <div class="screen"><div class="screen-title">Home</div><iframe src="home.html" title="Home"></iframe></div>
    <div class="screen"><div class="screen-title">Roadmap</div><iframe src="roadmap.html" title="Roadmap"></iframe></div>
    <div class="screen"><div class="screen-title">Guide</div><iframe src="guide.html" title="Guide"></iframe></div>
    <div class="screen"><div class="screen-title">Guide Detail</div><iframe src="guide-detail.html" title="Guide Detail"></iframe></div>
    <div class="screen"><div class="screen-title">Debt Editor</div><iframe src="debt-editor.html" title="Debt Editor"></iframe></div>
    <div class="screen"><div class="screen-title">Profile</div><iframe src="profile.html" title="Profile"></iframe></div>
    <div class="screen"><div class="screen-title">Settings</div><iframe src="settings.html" title="Settings"></iframe></div>
  </div>
</body>
</html>
