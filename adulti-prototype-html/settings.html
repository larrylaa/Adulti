<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adulti - Settings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div class="ios-frame">
    <div class="dynamic-island"></div>
    <div class="status-bar">
      <span>9:41</span>
      <span><i class="fa-solid fa-signal"></i> <i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-full"></i></span>
    </div>

    <main class="screen-scroll">
      <section class="card soft-gradient p-4">
        <h1 class="section-title">Settings</h1>
        <p class="section-subtitle">Control notifications, privacy, and account preferences.</p>
      </section>

      <section class="card mt-4 p-4">
        <div class="list-row"><span class="text-sm"><i class="fa-regular fa-bell mr-2 text-slate-500"></i>Roadmap reminders</span><i class="fa-solid fa-toggle-on text-[#22C55E] text-xl"></i></div>
        <div class="list-row"><span class="text-sm"><i class="fa-solid fa-shield-halved mr-2 text-slate-500"></i>Biometric lock</span><i class="fa-solid fa-toggle-on text-[#22C55E] text-xl"></i></div>
        <div class="list-row"><span class="text-sm"><i class="fa-solid fa-chart-column mr-2 text-slate-500"></i>Analytics</span><i class="fa-solid fa-toggle-on text-[#22C55E] text-xl"></i></div>
      </section>

      <section class="card mt-3 p-4">
        <div class="list-row"><span class="text-sm">Privacy policy</span><i class="fa-solid fa-chevron-right text-xs text-slate-400"></i></div>
        <div class="list-row"><span class="text-sm">Terms of service</span><i class="fa-solid fa-chevron-right text-xs text-slate-400"></i></div>
        <div class="list-row"><span class="text-sm text-red-600">Sign out</span><i class="fa-solid fa-arrow-right-from-bracket text-xs text-red-400"></i></div>
      </section>
    </main>

    <nav class="tab-bar">
      <div class="tab-item"><i class="fa-solid fa-house"></i>Home</div>
      <div class="tab-item"><i class="fa-solid fa-map"></i>Roadmap</div>
      <div class="tab-item"><i class="fa-solid fa-book-open"></i>Guide</div>
      <div class="tab-item active"><i class="fa-solid fa-gear"></i>Settings</div>
    </nav>
  </div>
</body>
</html>
